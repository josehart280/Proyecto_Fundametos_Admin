<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema de Vacaciones CUCR</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <!-- Fondo decorativo -->
        <div class="auth-background">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>

        <!-- Contenedor principal -->
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">CUCR</div>
                <h1>Sistema de Vacaciones</h1>
                <p>Inicia sesión para continuar</p>
            </div>

            <form id="loginForm" class="auth-form">
                <!-- Username / Identificador -->
                <div class="form-group">
                    <label for="username">Identificador</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Tu usuario o cédula"
                        required
                        minlength="3"
                    >
                    <span class="input-icon"></span>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Tu contraseña"
                        required
                    >
                    <span class="input-icon"></span>
                    <button type="button" class="toggle-password" id="togglePassword">
                        Ver
                    </button>
                </div>

                <!-- Mensajes de error/éxito -->
                <div id="mensaje" class="mensaje"></div>

                <!-- Botón Login -->
                <button type="submit" class="btn-primary btn-login">
                    <span class="btn-text">Iniciar Sesión</span>
                    <span class="btn-loader" style="display: none;">Cargando...</span>
                </button>
            </form>

            <!-- Opciones adicionales -->
            <div class="auth-options">
                <a href="/recuperar-password.html" class="link-recovery">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>

            <!-- Pie de página -->
            <div class="auth-footer">
                <p>Colegio Universitario de Cartago © 2026</p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const mensajeDiv = document.getElementById('mensaje');
        const btnLogin = form.querySelector('.btn-primary');
        const btnText = btnLogin.querySelector('.btn-text');
        const btnLoader = btnLogin.querySelector('.btn-loader');

        // Toggle mostrar/ocultar contraseña
        togglePasswordBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const tipo = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = tipo;
            togglePasswordBtn.textContent = tipo === 'password' ? 'Ver' : 'Ocultar';
        });

        // Manejar envío del formulario
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validaciones básicas
            if (!usernameInput.value.trim() || !passwordInput.value.trim()) {
                mostrarMensaje('Debe ingresar sus credenciales.', 'error');
                return;
            }

            if (usernameInput.value.length < 3) {
                mostrarMensaje('Formato de identificador inválido.', 'error');
                return;
            }

            // Estado de loading
            btnLogin.disabled = true;
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline';
            mensajeDiv.innerHTML = '';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: usernameInput.value.trim(),
                        password: passwordInput.value
                    })
                });

                const data = await response.json();

                if (data.exito) {
                    mostrarMensaje(data.mensaje, 'exito');
                    
                    // Guardar token en localStorage
                    localStorage.setItem('sesion_token', data.token);
                    localStorage.setItem('usuario_info', JSON.stringify(data.usuario));
                    
                    // Redirigir al dashboard después de 1.5 segundos
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1500);
                } else {
                    mostrarMensaje(data.mensaje || 'Error al iniciar sesión.', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarMensaje('Error de conexión con el servidor.', 'error');
            } finally {
                btnLogin.disabled = false;
                btnText.style.display = 'inline';
                btnLoader.style.display = 'none';
            }
        });

        // Función auxiliar para mostrar mensajes
        function mostrarMensaje(texto, tipo) {
            mensajeDiv.className = `mensaje ${tipo}`;
            mensajeDiv.innerHTML = `
                <div class="mensaje-contenido">
                    <span class="mensaje-icono">${tipo === 'exito' ? '[Éxito]' : '[Error]'}</span>
                    <span class="mensaje-texto">${texto}</span>
                </div>
            `;
        }
    </script>
</body>
</html>
