name: Branch Analyzer - PR Manager

on:
  push:
    branches-ignore:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  analyze-branch:
    runs-on: ubuntu-latest
    name: Analyze Branch Changes

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Analyze Branch Changes
        id: analyze
        run: |
          echo "## Branch Analysis Report" > BRANCH_ANALYSIS.md
          echo "" >> BRANCH_ANALYSIS.md
          echo "**Branch**: ${{ github.ref_name }}" >> BRANCH_ANALYSIS.md
          echo "**Author**: ${{ github.actor }}" >> BRANCH_ANALYSIS.md
          echo "**Date**: $(date)" >> BRANCH_ANALYSIS.md
          echo "" >> BRANCH_ANALYSIS.md

          echo "### 📊 Files Changed" >> BRANCH_ANALYSIS.md
          echo "" >> BRANCH_ANALYSIS.md
          git diff --name-status origin/main...HEAD >> BRANCH_ANALYSIS.md
          echo "" >> BRANCH_ANALYSIS.md

          echo "### 📈 Statistics" >> BRANCH_ANALYSIS.md
          echo "" >> BRANCH_ANALYSIS.md
          echo "- **Commits ahead of main**: $(git rev-list --count origin/main..HEAD)" >> BRANCH_ANALYSIS.md
          echo "- **Files changed**: $(git diff --name-only origin/main...HEAD | wc -l)" >> BRANCH_ANALYSIS.md
          echo "- **Insertions**: $(git diff --shortstat origin/main...HEAD | grep -oP '\d+(?= insertion)' || echo '0')" >> BRANCH_ANALYSIS.md
          echo "- **Deletions**: $(git diff --shortstat origin/main...HEAD | grep -oP '\d+(?= deletion)' || echo '0')" >> BRANCH_ANALYSIS.md
          echo "" >> BRANCH_ANALYSIS.md

          echo "### 🔍 Detailed Changes" >> BRANCH_ANALYSIS.md
          echo "" >> BRANCH_ANALYSIS.md
          echo "```diff" >> BRANCH_ANALYSIS.md
          git diff origin/main...HEAD >> BRANCH_ANALYSIS.md || echo "No diff available" >> BRANCH_ANALYSIS.md
          echo "```" >> BRANCH_ANALYSIS.md
          echo "" >> BRANCH_ANALYSIS.md

          echo "### ⚠️ Potential Issues" >> BRANCH_ANALYSIS.md
          echo "" >> BRANCH_ANALYSIS.md

          # Check for console.log
          if git diff origin/main...HEAD | grep -q "console.log"; then
            echo "- [ ] ⚠️ Found console.log statements (remove before production)" >> BRANCH_ANALYSIS.md
          fi

          # Check for TODO/FIXME
          if git diff origin/main...HEAD | grep -qi "TODO\|FIXME"; then
            echo "- [ ] ⚠️ Found TODO/FIXME comments" >> BRANCH_ANALYSIS.md
          fi

          # Check for SQL Injection patterns
          if git diff origin/main...HEAD | grep -q "'.*\${"; then
            echo "- [ ] 🔴 **CRITICAL**: Possible SQL Injection pattern detected" >> BRANCH_ANALYSIS.md
          fi

          # Check for hardcoded values
          if git diff origin/main...HEAD | grep -q "id_Personal = 1"; then
            echo "- [ ] 🟡 Hardcoded user ID found (should use authentication)" >> BRANCH_ANALYSIS.md
          fi

          echo "" >> BRANCH_ANALYSIS.md
          echo "### ✅ Merge Checklist" >> BRANCH_ANALYSIS.md
          echo "" >> BRANCH_ANALYSIS.md
          echo "- [ ] Code review completed" >> BRANCH_ANALYSIS.md
          echo "- [ ] Tests passing" >> BRANCH_ANALYSIS.md
          echo "- [ ] Security scan passed" >> BRANCH_ANALYSIS.md
          echo "- [ ] Documentation updated" >> BRANCH_ANALYSIS.md
          echo "- [ ] No console.log statements" >> BRANCH_ANALYSIS.md
          echo "- [ ] No hardcoded credentials" >> BRANCH_ANALYSIS.md
          echo "" >> BRANCH_ANALYSIS.md

          echo "### 📝 Recommendation" >> BRANCH_ANALYSIS.md
          echo "" >> BRANCH_ANALYSIS.md
          echo "**Status**: Ready for review" >> BRANCH_ANALYSIS.md
          echo "" >> BRANCH_ANALYSIS.md
          echo "---" >> BRANCH_ANALYSIS.md
          echo "*Generated by PR Manager Bot*" >> BRANCH_ANALYSIS.md

          cat BRANCH_ANALYSIS.md

      - name: Upload Analysis Artifact
        uses: actions/upload-artifact@v4
        with:
          name: branch-analysis-${{ github.run_id }}
          path: BRANCH_ANALYSIS.md

      - name: Comment PR with Analysis
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysis = fs.readFileSync('BRANCH_ANALYSIS.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: analysis
            });
